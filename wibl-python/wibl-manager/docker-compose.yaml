services:
  manager:
    build:
      context: .
      dockerfile: Dockerfile.dev
    restart: always
    env_file:
      - manager.env
    ports:
      #- '8001:8000'
      - '6080:5000'
    volumes:
      - 'managerpgdata:/var/lib/postgresql/data/'
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/heartbeat"]
      interval: 30s
      timeout: 1s
      retries: 5
    command: 'uvicorn src.wibl_manager.application:app --host 0.0.0.0 --port 5000 --workers 1'
    develop:
      watch:
        - action: sync+restart
          path: ./src/wibl_manager
          target: /usr/src/wibl/wibl_manager
    depends_on:
      - managerDB

  managerDB:
    build:
      context: .
      dockerfile_inline: |
        FROM postgres:17-bookworm
        RUN apt-get update \
            && apt-get install -y postgis postgresql-17-postgis-3 \
            && rm -rf /var/lib/apt/lists/*
        COPY ./scripts/init-postgis.sql /docker-entrypoint-initdb.d/
    image: postgres:17-bookworm
    container_name: managerDB
    environment:
      - POSTGRES_DB=postgres
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    ports:
      - "5432:5432"
    volumes:
      - managerpgdata:/var/lib/postgresql/data/
    command: -p 5432
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  managerpgdata:
