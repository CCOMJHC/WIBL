[
{
  "name": "wibl-manager",
  "image": "${REPLACEME_ACCOUNT_NUMBER}.dkr.ecr.${REPLACEME_AWS_REGION}.amazonaws.com/wibl/manager:latest",
  "portMappings": [
    {
      "containerPort": 8000,
      "protocol": "tcp"
    }
  ],
  "environment": [
    {
      "name": "MANAGER_DATABASE_URI",
      "value": "${REPLACEME_DATABASE_URI}"
    },
    {
      "name": "AWS_REGION",
      "value": "${REPLACEME_AWS_REGION}"
    },
    {
       "name": "WIBL_METADATA_BUCKET",
       "value": "${REPLACEME_WIBL_BUCKET}"
    },
    {
       "name": "GEOJSON_METADATA_BUCKET",
       "value": "${REPLACEME_GEOJSON_BUCKET}"
    }
  ],
  "logConfiguration": {
    "logDriver": "awslogs",
    "options": {
      "awslogs-create-group": "true",
      "awslogs-group": "wibl-manager-ecs-task-log",
      "awslogs-region": "${REPLACEME_AWS_REGION}",
      "awslogs-stream-prefix": "wibl-manager"
    }
  },
  "command": [
    "uvicorn",
    "src.wibl_manager.application:app",
    "--host", "0.0.0.0",
    "--port", "8000",
    "--workers", "1"
  ],
  "healthCheck": {
    "command": ["CMD", "curl", "-f", "http://localhost:8000/heartbeat"],
    "interval": 10,
    "timeout": 2,
    "retries": 5,
    "startPeriod": 5
  }
}
]